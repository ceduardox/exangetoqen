<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presupuesto MVP Exchange</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f4f8fb;
      --card: rgba(255, 255, 255, 0.78);
      --text: #0f2b3a;
      --muted: #4c6674;
      --brand: #0c8bb0;
      --brand-strong: #096f8d;
      --accent: #ff8b5a;
      --line: rgba(15, 43, 58, 0.12);
      --shadow: 0 22px 48px rgba(12, 68, 92, 0.15);
      --radius-xl: 22px;
      --radius-lg: 14px;
      --radius-sm: 10px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(1200px 800px at 15% -20%, #d3efff 0%, transparent 62%),
        radial-gradient(1200px 800px at 90% 10%, #ffe8d9 0%, transparent 58%),
        var(--bg);
      color: var(--text);
      font-family: "Manrope", "Segoe UI", sans-serif;
    }

    body {
      padding: 28px 18px 36px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      width: 340px;
      height: 340px;
      border-radius: 50%;
      left: -120px;
      bottom: -120px;
      background: radial-gradient(circle, rgba(255, 139, 90, 0.26), transparent 70%);
      filter: blur(8px);
      pointer-events: none;
      animation: floatGlow 14s ease-in-out infinite;
      z-index: 0;
    }

    .shell { max-width: 1200px; margin: 0 auto; position: relative; z-index: 1; }

    .toolbar {
      position: sticky;
      top: 12px;
      z-index: 20;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      padding: 14px;
      background: var(--card);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
    }

    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .brand-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: linear-gradient(140deg, var(--brand), var(--brand-strong));
      color: #fff;
      font-family: "Sora", sans-serif;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .toolbar-label {
      font-size: 0.86rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-right: 2px;
    }

    .lang-buttons {
      display: inline-flex;
      gap: 8px;
      padding: 5px;
      background: rgba(9, 111, 141, 0.08);
      border-radius: 999px;
    }

    .lang-btn, .pdf-btn {
      border: 0;
      font-family: "Sora", sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.18s ease, opacity 0.2s ease;
    }

    .lang-btn {
      font-size: 0.84rem;
      letter-spacing: 0.04em;
      color: var(--brand-strong);
      background: transparent;
      border-radius: 999px;
      padding: 8px 14px;
    }

    .lang-btn.active {
      color: #fff;
      background: linear-gradient(130deg, var(--brand), var(--brand-strong));
      box-shadow: 0 10px 22px rgba(9, 111, 141, 0.32);
    }

    .lang-btn:disabled, .pdf-btn:disabled {
      opacity: 0.65;
      cursor: wait;
      transform: none;
    }

    .pdf-btn {
      color: #fff;
      background: linear-gradient(130deg, var(--accent), #f76f5a);
      border-radius: 999px;
      padding: 10px 18px;
      box-shadow: 0 12px 26px rgba(247, 111, 90, 0.32);
      font-size: 0.88rem;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .hero {
      margin-top: 22px;
      padding: 30px 28px 24px;
      background: var(--card);
      border-radius: var(--radius-xl);
      border: 1px solid rgba(255, 255, 255, 0.78);
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(12, 139, 176, 0.22), transparent 68%);
      right: -64px;
      top: -72px;
      pointer-events: none;
    }

    .hero::before {
      content: "";
      position: absolute;
      height: 3px;
      width: 180px;
      left: 28px;
      top: 0;
      background: linear-gradient(90deg, #0f90b6, #ff8b5a);
      border-radius: 999px;
    }

    .title {
      margin: 0;
      font-family: "Sora", sans-serif;
      font-size: clamp(1.4rem, 2.8vw, 2.1rem);
      line-height: 1.15;
      letter-spacing: -0.015em;
      max-width: 760px;
      position: relative;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 1.02rem;
      font-weight: 500;
      position: relative;
    }

    .intro {
      margin: 20px 0 0;
      max-width: 930px;
      color: #244454;
      font-size: 0.98rem;
      line-height: 1.6;
      background: rgba(12, 139, 176, 0.08);
      border: 1px solid rgba(12, 139, 176, 0.16);
      padding: 13px 14px;
      border-radius: var(--radius-sm);
      position: relative;
    }

    .status {
      margin: 12px 0 0;
      font-size: 0.88rem;
      color: #0a627d;
      min-height: 1.2rem;
      font-weight: 600;
    }

    .impact-panel {
      margin-top: 14px;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid rgba(12, 139, 176, 0.2);
      background: linear-gradient(130deg, rgba(12, 139, 176, 0.08), rgba(255, 139, 90, 0.08));
    }

    .impact-title {
      margin: 0 0 10px;
      font-family: "Sora", sans-serif;
      font-size: 0.86rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #0b5f79;
    }

    .chip-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    }

    .chip {
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(15, 43, 58, 0.1);
      border-radius: 11px;
      padding: 10px 11px;
      font-size: 0.88rem;
      line-height: 1.45;
      color: #224354;
    }

    .chip strong {
      color: #093f52;
      font-weight: 700;
    }

    .showcase {
      margin-top: 16px;
      padding: 16px;
      border-radius: var(--radius-xl);
      background: linear-gradient(155deg, rgba(255, 255, 255, 0.84), rgba(230, 244, 252, 0.86));
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .showcase::after {
      content: "";
      position: absolute;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      right: -90px;
      bottom: -90px;
      background: radial-gradient(circle, rgba(12, 139, 176, 0.17), transparent 70%);
      pointer-events: none;
    }

    .showcase-title {
      margin: 0;
      font-family: "Sora", sans-serif;
      font-size: 1.04rem;
      color: #0d3343;
      letter-spacing: -0.01em;
    }

    .showcase-sub {
      margin: 6px 0 12px;
      font-size: 0.9rem;
      color: #375564;
      max-width: 800px;
    }

    .ticker-rail {
      overflow: hidden;
      border: 1px solid rgba(15, 43, 58, 0.11);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.8);
      margin-bottom: 12px;
      position: relative;
    }

    .ticker-track {
      display: flex;
      gap: 10px;
      width: max-content;
      padding: 8px 10px;
      animation: tickerSlide 24s linear infinite;
    }

    .ticker-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      font-family: "Sora", sans-serif;
      font-size: 0.78rem;
      white-space: nowrap;
      background: #f4fbff;
      border: 1px solid rgba(12, 139, 176, 0.18);
      color: #0d4a5f;
    }

    .ticker-pill::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #17b471;
      box-shadow: 0 0 0 5px rgba(23, 180, 113, 0.16);
      flex: 0 0 auto;
    }

    .showcase-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      position: relative;
    }

    .showcase-card {
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(15, 43, 58, 0.1);
      border-radius: 12px;
      padding: 12px;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .showcase-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 26px rgba(8, 68, 92, 0.12);
      border-color: rgba(12, 139, 176, 0.28);
    }

    .showcase-card h3 {
      margin: 0 0 6px;
      font-family: "Sora", sans-serif;
      font-size: 0.87rem;
      letter-spacing: 0.02em;
      color: #0d3b4d;
    }

    .showcase-card p {
      margin: 0;
      font-size: 0.86rem;
      line-height: 1.46;
      color: #335461;
    }

    .table-wrap {
      margin-top: 18px;
      padding: 14px;
      background: var(--card);
      border-radius: var(--radius-xl);
      border: 1px solid rgba(255, 255, 255, 0.72);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .table-title {
      margin: 0 0 12px;
      font-family: "Sora", sans-serif;
      font-size: 0.95rem;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    .table-scroll {
      overflow: visible;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 0;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 1;
      text-align: left;
      font-family: "Sora", sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      background: linear-gradient(140deg, #0f90b6, #0a7898);
      color: #fff;
      padding: 12px;
      border-right: 1px solid rgba(255, 255, 255, 0.15);
    }

    thead th:last-child { border-right: 0; }

    tbody td {
      font-size: 0.9rem;
      line-height: 1.52;
      padding: 12px;
      border-bottom: 1px solid #edf2f5;
      vertical-align: top;
      color: #1f3e4d;
      background: #fff;
    }

    tbody tr:hover td { background: #f9fcff; }

    tbody td:first-child {
      width: 170px;
      font-family: "Sora", sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: #0f3444;
    }

    tbody td:last-child {
      width: 120px;
      text-align: right;
      white-space: nowrap;
      font-family: "Sora", sans-serif;
      font-weight: 600;
      color: #0a627d;
    }

    .footer-note {
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.5;
    }

    @media (max-width: 840px) {
      body { padding: 18px 12px 26px; }
      .toolbar { top: 8px; padding: 10px; }
      .hero { padding: 20px 16px; }
      .table-wrap { padding: 10px; }
      .hero::before { left: 16px; width: 120px; }
      tbody td:first-child { width: 132px; }
      tbody td:last-child { width: 104px; }
    }

    @keyframes floatGlow {
      0% { transform: translateY(0); opacity: 0.9; }
      50% { transform: translateY(-18px); opacity: 1; }
      100% { transform: translateY(0); opacity: 0.9; }
    }

    @keyframes tickerSlide {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="toolbar">
      <div class="toolbar-left">
        <span class="brand-badge">MVP</span>
        <span class="toolbar-label" id="languageLabel">Idioma</span>
        <div class="lang-buttons" role="group" aria-label="Seleccion de idioma">
          <button type="button" class="lang-btn active" data-lang="es">ES</button>
          <button type="button" class="lang-btn" data-lang="en">EN</button>
          <button type="button" class="lang-btn" data-lang="pt">PT</button>
        </div>
      </div>
      <button type="button" class="pdf-btn" id="downloadPdfBtn">Descargar PDF</button>
    </header>

    <section class="hero" aria-labelledby="docTitle">
      <h1 class="title" id="docTitle"></h1>
      <p class="subtitle" id="docSubtitle"></p>
      <p class="intro" id="docIntro"></p>
      <p class="status" id="statusMsg"></p>
      <div class="impact-panel" aria-live="polite">
        <p class="impact-title" id="impactTitle"></p>
        <div class="chip-grid" id="impactChips"></div>
      </div>

    </section>

    <section class="showcase" aria-labelledby="showcaseTitle">
      <h2 class="showcase-title" id="showcaseTitle"></h2>
      <p class="showcase-sub" id="showcaseSub"></p>
      <div class="ticker-rail" aria-label="Indicadores de mercado">
        <div class="ticker-track" id="tickerTrack"></div>
      </div>
      <div class="showcase-grid" id="showcaseGrid"></div>
    </section>

    <section class="table-wrap" aria-labelledby="tableTitle">
      <p class="table-title" id="tableTitle"></p>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th id="thArea"></th>
              <th id="thScope"></th>
              <th id="thBudget"></th>
            </tr>
          </thead>
          <tbody id="tbodyRows"></tbody>
        </table>
      </div>
      <p class="footer-note" id="docFooter"></p>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
  <script>
    const BASE = {
      ui: {
        language: "Idioma",
        download: "Descargar PDF",
        tableTitle: "Tabla detallada del alcance MVP",
        status: { loading: "Traduciendo contenido...", error: "No se pudo traducir automatico. Se muestra una version parcial." }
      },
      doc: {
        title: "Plataforma Exchange Crypto",
        subtitle: "MVP comercial con mejoras clave sin subir presupuesto",
        intro: "Documento ejecutivo sin totales. Se amplian las explicaciones para reflejar mejor las funciones reales que debe cubrir una exchange en su etapa MVP, sin modificar ningun presupuesto.",
        footer: ""
      },
      highlights: {
        title: "Upgrade sugerido sin incrementar el presupuesto",
        items: [
          { head: "Graficas crypto pro", body: "Velas, volumen y panel de mercado en tiempo real con libreria especializada." },
          { head: "Custodia hot + cold wallet", body: "Retiros por lotes con aprobacion manual/multifirma para reducir riesgo." },
          { head: "Motor anti-fraude en retiros", body: "Whitelist de direcciones, limites diarios y alertas por patron sospechoso." },
          { head: "WebSocket operativo", body: "Precios, estado de ordenes y movimientos en vivo para web y app movil." },
          { head: "Monitoreo 24/7", body: "Alertas de nodos, wallets y servicios criticos con protocolos de respuesta." },
          { head: "Template premium visible", body: "UI mas comercial para impresionar clientes e inversionistas desde la demo." }
        ]
      },
      showcase: {
        title: "Percepcion visual nivel producto real",
        subtitle: "Este bloque eleva la imagen del presupuesto: demuestra mercado en vivo, enfoque de seguridad y experiencia comercial.",
        tickers: ["BTC/USDT +2.41%", "ETH/USDT +1.37%", "SOL/USDT +3.05%", "BNB/USDT +0.86%", "XRP/USDT +1.12%"],
        cards: [
          { title: "Market Experience", body: "Panel de mercado con graficas de velas, volumen y movimientos en vivo para web y app." },
          { title: "Custodia Inteligente", body: "Modelo hibrido hot/cold wallet con retiros por lote y controles de riesgo operativos." },
          { title: "Operacion Confiable", body: "Alertas, monitoreo y respuesta temprana para nodos, wallets y servicios criticos." }
        ]
      },
      table: { area: "Area", scope: "Que incluye detalladamente", budget: "Presupuesto" },
      items: [
        { area: "Backend principal", scope: "Desarrollo del nucleo transaccional y administrativo de la exchange: API principal, autenticacion segura, gestion de usuarios y perfiles, balances internos por activo, historial de movimientos, integracion con wallets hot, solicitudes y control de depositos/retiros, estados transaccionales, bitacora inicial de operaciones y panel administrativo basico. Tambien contempla funciones tipicas que una exchange necesita desde el arranque, como gestion de cuentas, conciliacion operativa inicial, consulta de saldos, trazabilidad de transacciones, reglas basicas para aprobacion o revision de retiros y estructura base para modulo P2P o intercambio interno inicial. Preparado para integrarse con frontend web, apps moviles y servicios blockchain. Incluye canal WebSocket para precios/ordenes en tiempo real y estructura para agregacion de velas (OHLC).", budget: "$6,000 USD" },
        { area: "Frontend web", scope: "Desarrollo del panel web para usuarios y administracion: dashboard principal, visualizacion de mercado, balances, historial, ordenes, depositos, retiros, perfil, alertas visuales, formularios operativos y panel administrativo basico. Se refuerzan funciones que una exchange debe mostrar con claridad, como resumen de cuenta, historial de operaciones, estado de depositos y retiros, consulta de precios o mercado, seguimiento de ordenes y acceso a seguridad de cuenta. Incluye diseno responsive para desktop y movil, estructura clara de navegacion y una base profesional para operar comercialmente desde navegador. Tambien integra modulo de graficas crypto (velas, volumen y tendencias) para lectura de mercado en tiempo real.", budget: "$3,000 USD" },
        { area: "Diseno UI/UX", scope: "Ajuste visual y estructural del producto: branding inicial, jerarquia visual, pantallas principales, experiencia web, componentes reutilizables, estructura funcional del dashboard, formularios y vistas operativas. Se orienta a que las funciones criticas de una exchange -como depositar, retirar, ver balances, revisar historial, consultar el mercado y gestionar la cuenta- sean faciles de entender y ejecutar. El objetivo es que el MVP no se vea como demo tecnica, sino como producto comercial presentable ante clientes, socios o inversionistas.", budget: "$1,500 USD" },
        { area: "Apps moviles", scope: "Desarrollo de version Android e iOS con enfoque comercial apurado, usando base reutilizable o stack hibrido para reducir tiempos y costos. Incluye login, perfil, consulta de balances, historial, depositos, retiros, notificaciones basicas y conexion directa al backend. Tambien cubre funciones minimas que un usuario espera en una exchange movil: acceso rapido a su cuenta, consulta de precios o mercado, revision de movimientos, gestion de seguridad basica y seguimiento de operaciones. Se deja lista la base para compilacion, pruebas y publicacion inicial en tiendas.", budget: "$6,000 USD" },
        { area: "Template / base exchange", scope: "Compra y adaptacion de plantilla premium o base visual/tecnica para acelerar la salida al mercado. Puede incluir layout de dashboard, tablas, componentes de UI, estructuras visuales y modulos reutilizables que reducen tiempo de maquetacion y mejoran la presentacion inicial del producto. Ayuda a cubrir mas rapido vistas propias de una exchange, como panel de mercado, movimientos, ordenes, activos y gestion de usuario.", budget: "$300 USD" },
        { area: "OTP y seguridad inicial", scope: "Implementacion de seguridad base para entorno productivo: OTP por correo, estructura para OTP por SMS, control de sesiones, expiracion de tokens o accesos, rate limiting, validaciones de endpoints sensibles, proteccion basica contra abuso, control de intentos fallidos y endurecimiento inicial de rutas criticas como login, retiros y cambios de cuenta. Se enfoca en funciones esenciales de seguridad que una exchange debe tener desde el principio: proteccion de acceso, confirmacion de acciones sensibles y barreras iniciales contra uso indebido. Se incorpora whitelist de direcciones y limites de retiro por perfil para reducir fraude.", budget: "$1,200 USD" },
        { area: "Smart contracts", scope: "Desarrollo e integracion de hasta 3 smart contracts basicos para funciones especificas del ecosistema. Incluye programacion, pruebas funcionales iniciales, despliegue y conexion con backend o logica de plataforma donde corresponda. Puede servir para respaldar procesos como manejo de activos tokenizados, logica puntual on-chain o funciones concretas del producto. Enfocado a un MVP usable, no a una arquitectura on-chain compleja ni a auditoria externa avanzada.", budget: "$1,350 USD" },
        { area: "Traduccion multiidioma (i18n)", scope: "Implementacion base de espanol e ingles mediante estructura tecnica de internacionalizacion: archivos de idioma, traduccion de textos principales, selector de idioma, adaptacion de componentes de interfaz y preparacion del frontend para escalar a mas idiomas sin rehacer la arquitectura visual o funcional. Esto permite que funciones centrales de la exchange -registro, balances, depositos, retiros, historial, mercado, ordenes y seguridad de cuenta- puedan mostrarse correctamente en mas de un idioma.", budget: "$1,200 USD" },
        { area: "Infraestructura inicial", scope: "Montaje del entorno tecnico minimo para produccion: VPS o servidor cloud, configuracion del sistema base, nodo o conexion RPC/API blockchain, base de datos productiva, Redis o cache auxiliar, integracion de APIs externas, configuracion de Cloudflare, dominio, DNS, backups iniciales y monitoreo basico del primer mes. Aqui se incluye la base tecnica real para que la exchange opere en internet con acceso publico: servidor de aplicacion, base de datos, resolucion de dominio, SSL a traves de la capa de despliegue, proteccion perimetral con Cloudflare, conectividad blockchain y recursos iniciales para continuidad operativa. Se deja definida arquitectura de custodia hibrida con hot wallet operativa y cold wallet de resguardo.", budget: "$2,411 USD" },
        { area: "QA basico", scope: "Pruebas funcionales generales del MVP en web y movil: login, registro, depositos, retiros, balances, historial, flujo de panel, validaciones basicas, revision de errores visibles y chequeo operativo de los modulos principales. Se revisan especialmente funciones que son clave en una exchange: acceso de usuario, lectura correcta de saldos, consistencia del historial, solicitud de retiros, visualizacion del mercado y estabilidad de las pantallas principales.", budget: "$1,200 USD" },

        { area: "Publicacion tiendas", scope: "Preparacion para Google Play Console y Apple Developer: configuracion inicial, empaquetado, compilaciones base, assets minimos y apoyo tecnico para dejar listas las apps para publicacion. Esto permite que las funciones moviles de la exchange queden listas para distribuirse a usuarios finales mediante tiendas oficiales.", budget: "$300 USD" },
        { area: "Soporte operativo inicial", scope: "Fondo operativo minimo para incidencias, ajustes tempranos, correcciones menores post-lanzamiento, revision de errores iniciales y acompanamiento tecnico en el arranque comercial del producto. Sirve para estabilizar funciones sensibles de la exchange durante sus primeros dias o semanas de uso real, sin modificar el alcance ni el presupuesto base del MVP.", budget: "$1,500 USD" }
      ]
    };

    const MANUAL = {
      en: {
        ui: {
          language: "Language",
          download: "Download PDF",
          tableTitle: "Detailed MVP scope table",
          status: { loading: "Translating content to English...", error: "Auto translation failed. Showing partial translation." }
        },
        doc: { title: "Crypto Exchange Platform", subtitle: "Commercial MVP with key upgrades and no budget increase" },
        highlights: {
          title: "Suggested upgrade with the same budget",

          ]
        },
        table: { area: "Area", scope: "Detailed scope", budget: "Budget" },
        areas: {
          "Backend principal": "Core backend",
          "Frontend web": "Web frontend",

        }
      },
      pt: {
        ui: {
          language: "Idioma",
          download: "Baixar PDF",
          tableTitle: "Tabela detalhada do escopo MVP",
          status: { loading: "Traduzindo conteudo para portugues...", error: "Falha na traducao automatica. Exibindo traducao parcial." }
        },
        doc: { title: "Plataforma Exchange Crypto", subtitle: "MVP comercial com melhorias-chave sem aumentar o orcamento" },
        highlights: {

          items: [

            { head: "WebSocket operacional", body: "Precos, status de ordens e movimentos ao vivo para web e mobile." },
            { head: "Monitoramento 24/7", body: "Alertas de nos, wallets e servicos criticos com playbooks de resposta." },
            { head: "Template premium visivel", body: "UI mais comercial para impressionar clientes e investidores desde o inicio." }
          ]
        },
        showcase: {
          title: "Percepcao visual de produto real",
          subtitle: "Este bloco eleva a imagem da proposta mostrando logica de mercado ao vivo, seguranca e experiencia comercial.",
          tickers: ["BTC/USDT +2.41%", "ETH/USDT +1.37%", "SOL/USDT +3.05%", "BNB/USDT +0.86%", "XRP/USDT +1.12%"],
          cards: [
            { title: "Market Experience", body: "Area de mercado ao vivo com velas, volume e visibilidade operacional." },
            { title: "Custodia Inteligente", body: "Modelo hibrido hot/cold wallet com saques em lote e controles de risco." },
            { title: "Operacao Confiavel", body: "Monitoramento e alertas para nos, wallets e servicos criticos com rotina de resposta." }
          ]
        },
        table: { area: "Area", scope: "Escopo detalhado", budget: "Orcamento" },
        areas: {
          "Backend principal": "Backend principal",
          "Frontend web": "Frontend web",
          "Diseno UI/UX": "Design UI/UX",
          "Apps moviles": "Apps moveis",
          "Template / base exchange": "Template / base exchange",
          "OTP y seguridad inicial": "OTP e seguranca inicial",
          "Smart contracts": "Smart contracts",
          "Traduccion multiidioma (i18n)": "Traducao multi-idioma (i18n)",
          "Infraestructura inicial": "Infraestrutura inicial",
          "QA basico": "QA basico",
          "DevOps y despliegue": "DevOps e deploy",
          "Publicacion tiendas": "Publicacao em lojas",
          "Soporte operativo inicial": "Suporte operacional inicial"
        }
      }
    };

    const cache = { es: structuredClone(BASE) };
    const state = { lang: "es", pack: cache.es, busy: false, requestId: 0 };

    const refs = {
      languageLabel: document.getElementById("languageLabel"),
      downloadBtn: document.getElementById("downloadPdfBtn"),
      title: document.getElementById("docTitle"),
      subtitle: document.getElementById("docSubtitle"),
      intro: document.getElementById("docIntro"),
      impactTitle: document.getElementById("impactTitle"),
      impactChips: document.getElementById("impactChips"),
      showcaseTitle: document.getElementById("showcaseTitle"),
      showcaseSub: document.getElementById("showcaseSub"),
      tickerTrack: document.getElementById("tickerTrack"),
      showcaseGrid: document.getElementById("showcaseGrid"),
      status: document.getElementById("statusMsg"),
      tableTitle: document.getElementById("tableTitle"),
      thArea: document.getElementById("thArea"),
      thScope: document.getElementById("thScope"),
      thBudget: document.getElementById("thBudget"),
      rows: document.getElementById("tbodyRows"),
      footer: document.getElementById("docFooter")
    };

    function render() {
      const pack = state.pack;
      document.documentElement.lang = state.lang;

      refs.languageLabel.textContent = pack.ui.language;
      refs.downloadBtn.textContent = pack.ui.download;
      refs.title.textContent = pack.doc.title;
      refs.subtitle.textContent = pack.doc.subtitle;
      refs.intro.textContent = pack.doc.intro;
      refs.footer.textContent = pack.doc.footer;
      refs.footer.style.display = pack.doc.footer ? "block" : "none";
      refs.impactTitle.textContent = pack.highlights.title;
      refs.impactChips.innerHTML = "";
      pack.highlights.items.forEach((item) => {
        const chip = document.createElement("div");
        chip.className = "chip";
        const strong = document.createElement("strong");
        strong.textContent = item.head;
        chip.append(strong, document.createTextNode(" " + item.body));
        refs.impactChips.appendChild(chip);
      });

      refs.showcaseTitle.textContent = pack.showcase.title;
      refs.showcaseSub.textContent = pack.showcase.subtitle;

      refs.tickerTrack.innerHTML = "";
      const tickerLoop = [...pack.showcase.tickers, ...pack.showcase.tickers];
      tickerLoop.forEach((label) => {
        const pill = document.createElement("span");
        pill.className = "ticker-pill";
        pill.textContent = label;
        refs.tickerTrack.appendChild(pill);
      });

      refs.showcaseGrid.innerHTML = "";
      pack.showcase.cards.forEach((card) => {
        const el = document.createElement("article");
        el.className = "showcase-card";
        const h3 = document.createElement("h3");
        h3.textContent = card.title;
        const p = document.createElement("p");
        p.textContent = card.body;
        el.append(h3, p);
        refs.showcaseGrid.appendChild(el);
      });

      refs.tableTitle.textContent = pack.ui.tableTitle;
      refs.thArea.textContent = pack.table.area;
      refs.thScope.textContent = pack.table.scope;
      refs.thBudget.textContent = pack.table.budget;

      refs.rows.innerHTML = "";
      pack.items.forEach((item) => {
        const tr = document.createElement("tr");
        const tdArea = document.createElement("td"); tdArea.textContent = item.area;
        const tdScope = document.createElement("td"); tdScope.textContent = item.scope;
        const tdBudget = document.createElement("td"); tdBudget.textContent = item.budget;
        tr.append(tdArea, tdScope, tdBudget);
        refs.rows.appendChild(tr);
      });

      document.querySelectorAll(".lang-btn").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.lang === state.lang);
        btn.disabled = state.busy;
      });

      refs.downloadBtn.disabled = state.busy;
    }

    function cloneManualPack(lang) {
      const m = MANUAL[lang];
      return {
        ui: structuredClone(m.ui),
        doc: { title: m.doc.title, subtitle: m.doc.subtitle, intro: BASE.doc.intro, footer: BASE.doc.footer },
        highlights: m.highlights ? structuredClone(m.highlights) : structuredClone(BASE.highlights),
        showcase: m.showcase ? structuredClone(m.showcase) : structuredClone(BASE.showcase),
        table: structuredClone(m.table),
        items: BASE.items.map((it) => ({
          area: m.areas[it.area] || it.area,
          scope: it.scope,
          budget: it.budget
        }))
      };
    }

    async function translateText(text, target) {
      const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=es&tl=${target}&dt=t&q=${encodeURIComponent(text)}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error("translate_request_failed");
      const data = await res.json();
      return Array.isArray(data[0]) ? data[0].map((part) => part[0]).join("") : text;
    }

    async function ensureLangPack(lang) {
      if (cache[lang]) return cache[lang];

      const draft = cloneManualPack(lang);
      cache[lang] = draft;

      try {
        const translatedScopes = await Promise.all(BASE.items.map((it) => translateText(it.scope, lang)));
        const intro = await translateText(BASE.doc.intro, lang);
        const footer = await translateText(BASE.doc.footer, lang);

        draft.items = BASE.items.map((it, i) => ({
          area: draft.items[i].area,
          scope: translatedScopes[i] || it.scope,
          budget: it.budget
        }));
        draft.doc.intro = intro || BASE.doc.intro;
        draft.doc.footer = footer || BASE.doc.footer;
      } catch (err) {
        console.warn("translation_fallback", err);
      }

      cache[lang] = draft;
      return draft;
    }

    function setStatus(text) {
      refs.status.textContent = text || "";
    }

    async function switchLanguage(lang) {
      if (lang === state.lang || state.busy) return;

      state.lang = lang;
      if (lang === "es") {
        state.pack = cache.es;
        setStatus("");
        render();
        return;
      }

      const requestId = ++state.requestId;
      state.busy = true;
      state.pack = cloneManualPack(lang);
      setStatus(state.pack.ui.status.loading);
      render();

      try {
        const pack = await ensureLangPack(lang);
        if (requestId !== state.requestId) return;
        state.pack = pack;
        setStatus("");
      } catch (err) {
        if (requestId !== state.requestId) return;
        setStatus(state.pack.ui.status.error);
      } finally {
        if (requestId === state.requestId) {
          state.busy = false;
          render();
        }
      }
    }

    function downloadPdf() {
      const pack = state.pack;
      const jsPdfLib = window.jspdf && window.jspdf.jsPDF;

      if (!jsPdfLib) {
        window.print();
        return;
      }

      const doc = new jsPdfLib({ orientation: "landscape", unit: "pt", format: "a4" });
      const rows = pack.items.map((item) => [item.area, item.scope, item.budget]);

      doc.setFont("helvetica", "bold");
      doc.setFontSize(16);
      doc.text(pack.doc.title, 40, 38);
      doc.setFont("helvetica", "normal");
      doc.setFontSize(11);
      doc.text(pack.doc.subtitle, 40, 56);
      doc.setFontSize(9);
      doc.text(pack.doc.intro, 40, 74, { maxWidth: 760 });

      if (typeof doc.autoTable === "function") {
        doc.autoTable({
          startY: 92,
          margin: { left: 40, right: 40 },
          head: [[pack.table.area, pack.table.scope, pack.table.budget]],
          body: rows,
          theme: "grid",
          styles: { fontSize: 8, cellPadding: 5, overflow: "linebreak", textColor: [26, 54, 66], valign: "top" },
          headStyles: { fillColor: [11, 122, 152], textColor: [255, 255, 255], fontStyle: "bold" },
          columnStyles: { 0: { cellWidth: 130 }, 1: { cellWidth: 510 }, 2: { cellWidth: 88, halign: "right" } }
        });
        const finalY = doc.lastAutoTable && doc.lastAutoTable.finalY ? doc.lastAutoTable.finalY : 92;
        doc.setFontSize(8);
        doc.text(pack.doc.footer, 40, Math.min(finalY + 18, 560), { maxWidth: 760 });
      }

      const nameMap = { es: "espanol", en: "english", pt: "portugues" };
      doc.save(`presupuesto_mvp_${nameMap[state.lang]}.pdf`);
    }

    document.querySelectorAll(".lang-btn").forEach((btn) => {
      btn.addEventListener("click", () => switchLanguage(btn.dataset.lang));
    });
    refs.downloadBtn.addEventListener("click", downloadPdf);

    render();
  </script>
