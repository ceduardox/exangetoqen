<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orcamento MVP Exchange Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* Dark Premium Palette - Midnight Spreadsheet + Neon Accents */
      --bg-deep: #0a0f1e;
      --bg-card: rgba(17, 24, 39, 0.7);
      --bg-glass: rgba(30, 41, 59, 0.4);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      
      /* Neon Accents */
      --accent-cyan: #06b6d4;
      --accent-cyan-glow: rgba(6, 182, 212, 0.4);
      --accent-purple: #8b5cf6;
      --accent-purple-glow: rgba(139, 92, 246, 0.4);
      --accent-emerald: #10b981;
      --accent-amber: #f59e0b;
      
      /* Gradients */
      --gradient-primary: linear-gradient(135deg, #06b6d4 0%, #8b5cf6 100%);
      --gradient-surface: linear-gradient(180deg, rgba(30, 41, 59, 0.8) 0%, rgba(15, 23, 42, 0.9) 100%);
      --gradient-hero: radial-gradient(ellipse at top, rgba(6, 182, 212, 0.15) 0%, transparent 50%),
                        radial-gradient(ellipse at bottom right, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
      
      /* Glass Effects */
      --glass-border: 1px solid rgba(255, 255, 255, 0.08);
      --glass-border-strong: 1px solid rgba(255, 255, 255, 0.15);
      --blur-heavy: blur(20px) saturate(180%);
      --blur-light: blur(12px) saturate(150%);
      
      /* Shadows & Glows */
      --shadow-glow-cyan: 0 0 40px rgba(6, 182, 212, 0.3);
      --shadow-glow-purple: 0 0 40px rgba(139, 92, 246, 0.3);
      --shadow-card: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      --shadow-elevated: 0 32px 64px -12px rgba(0, 0, 0, 0.6);
      
      /* Spacing & Radius */
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 20px;
      --radius-xl: 28px;
      color-scheme: dark;
    }

    :root[data-theme="light"] {
      --bg-deep: #eef5fb;
      --bg-card: rgba(255, 255, 255, 0.82);
      --bg-glass: rgba(255, 255, 255, 0.72);
      --text-primary: #0f172a;
      --text-secondary: #334155;
      --text-muted: #64748b;
      --gradient-surface: linear-gradient(180deg, rgba(255, 255, 255, 0.92) 0%, rgba(241, 248, 255, 0.9) 100%);
      --gradient-hero: radial-gradient(ellipse at top, rgba(6, 182, 212, 0.16) 0%, transparent 58%),
                       radial-gradient(ellipse at bottom right, rgba(139, 92, 246, 0.12) 0%, transparent 58%);
      --glass-border: 1px solid rgba(15, 23, 42, 0.08);
      --glass-border-strong: 1px solid rgba(15, 23, 42, 0.14);
      --shadow-card: 0 20px 40px -12px rgba(15, 23, 42, 0.18);
      --shadow-elevated: 0 28px 56px -16px rgba(15, 23, 42, 0.22);
      color-scheme: light;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      scroll-behavior: smooth;
      background: var(--bg-deep);
    }

    body {
      min-height: 100vh;
      background: 
        radial-gradient(1200px 800px at 20% -10%, rgba(6, 182, 212, 0.08) 0%, transparent 60%),
        radial-gradient(1000px 600px at 90% 20%, rgba(139, 92, 246, 0.06) 0%, transparent 55%),
        radial-gradient(800px 600px at 50% 100%, rgba(16, 185, 129, 0.05) 0%, transparent 50%),
        var(--bg-deep);
      color: var(--text-primary);
      font-family: "Inter", system-ui, sans-serif;
      line-height: 1.6;
      overflow-x: hidden;
      position: relative;
    }

    /* Animated Background Grid */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: 
        linear-gradient(rgba(6, 182, 212, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
      animation: gridMove 20s linear infinite;
    }

    :root[data-theme="light"] body {
      background:
        radial-gradient(1200px 800px at 20% -10%, rgba(6, 182, 212, 0.1) 0%, transparent 65%),
        radial-gradient(1000px 600px at 90% 20%, rgba(139, 92, 246, 0.08) 0%, transparent 60%),
        radial-gradient(800px 600px at 50% 100%, rgba(16, 185, 129, 0.08) 0%, transparent 55%),
        var(--bg-deep);
    }

    :root[data-theme="light"] body::before {
      background-image:
        linear-gradient(rgba(15, 23, 42, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(15, 23, 42, 0.05) 1px, transparent 1px);
    }

    @keyframes gridMove {
      0% { transform: translate(0, 0); }
      100% { transform: translate(60px, 60px); }
    }

    .shell { 
      max-width: 1280px; 
      margin: 0 auto; 
      padding: 32px 24px;
      position: relative; 
      z-index: 1; 
    }

    /* Floating Orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }
    .orb-1 {
      width: 400px; height: 400px;
      background: var(--accent-cyan);
      top: -100px; left: -100px;
      animation: floatOrb 15s ease-in-out infinite;
    }
    .orb-2 {
      width: 300px; height: 300px;
      background: var(--accent-purple);
      bottom: 10%; right: -50px;
      animation: floatOrb 18s ease-in-out infinite reverse;
    }
    .orb-3 {
      width: 200px; height: 200px;
      background: var(--accent-emerald);
      top: 40%; left: 60%;
      animation: floatOrb 20s ease-in-out infinite;
      opacity: 0.2;
    }

    @keyframes floatOrb {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.9); }
    }

    /* Toolbar - Glassmorphism Premium */
    .toolbar {
      position: sticky;
      top: 20px;
      z-index: 50;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      background: var(--bg-glass);
      backdrop-filter: var(--blur-heavy);
      border: var(--glass-border-strong);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-card), var(--shadow-glow-cyan);
      transition: all 0.3s ease;
    }

    .toolbar:hover {
      box-shadow: var(--shadow-elevated), var(--shadow-glow-cyan);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .toolbar-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .brand-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: var(--radius-md);
      background: var(--gradient-primary);
      color: #fff;
      font-family: "Space Grotesk", sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: -0.02em;
      box-shadow: 0 0 20px var(--accent-cyan-glow);
      position: relative;
      overflow: hidden;
    }

    .brand-badge::after {
      content: "";
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
      animation: shimmer 3s infinite;
    }

    @keyframes shimmer {
      0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
      100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
    }

    .toolbar-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .lang-buttons {
      display: inline-flex;
      gap: 6px;
      padding: 6px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 999px;
      border: var(--glass-border);
    }

    .lang-btn, .pdf-btn, .theme-btn {
      border: 0;
      font-family: "Space Grotesk", sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .lang-btn {
      font-size: 0.8rem;
      letter-spacing: 0.04em;
      color: var(--text-secondary);
      background: transparent;
      border-radius: 999px;
      padding: 10px 18px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .lang-flag {
      width: 18px;
      height: 13px;
      object-fit: cover;
      border-radius: 2px;
      flex-shrink: 0;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.25);
    }

    :root[data-theme="light"] .lang-flag {
      box-shadow: 0 0 0 1px rgba(15, 23, 42, 0.16);
    }

    .lang-btn:hover {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.1);
    }

    .lang-btn.active {
      color: #fff;
      background: var(--gradient-primary);
      box-shadow: 0 4px 20px var(--accent-cyan-glow);
    }

    .theme-btn {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.08);
      border: var(--glass-border);
      border-radius: 999px;
      padding: 11px 18px;
      font-size: 0.86rem;
      letter-spacing: 0.02em;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .theme-btn:hover {
      transform: translateY(-2px);
      border-color: rgba(6, 182, 212, 0.35);
      box-shadow: 0 8px 24px rgba(6, 182, 212, 0.2);
    }

    .theme-btn::before {
      content: "☾";
      font-size: 0.95rem;
    }

    :root[data-theme="light"] .theme-btn::before {
      content: "☀";
    }

    .lang-btn:disabled, .pdf-btn:disabled, .theme-btn:disabled {
      opacity: 0.5;
      cursor: wait;
    }

    .pdf-btn {
      color: #fff;
      background: linear-gradient(135deg, var(--accent-emerald) 0%, #059669 100%);
      border-radius: 999px;
      padding: 12px 24px;
      font-size: 0.9rem;
      letter-spacing: 0.02em;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(16, 185, 129, 0.3);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pdf-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(16, 185, 129, 0.4);
    }

    .pdf-btn::before {
      content: "↓";
      font-size: 1.1rem;
    }

    /* Hero Section - Premium Glass */
    .hero {
      margin-top: 32px;
      padding: 48px 40px;
      background: var(--gradient-surface);
      backdrop-filter: var(--blur-heavy);
      border-radius: var(--radius-xl);
      border: var(--glass-border-strong);
      box-shadow: var(--shadow-elevated);
      overflow: hidden;
      position: relative;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--gradient-hero);
      pointer-events: none;
    }

    :root[data-theme="light"] .hero {
      border-color: rgba(15, 23, 42, 0.12);
      box-shadow: 0 20px 44px -16px rgba(15, 23, 42, 0.2);
    }

    .hero-accent-line {
      position: absolute;
      top: 0; left: 40px;
      width: 120px; height: 3px;
      background: var(--gradient-primary);
      border-radius: 999px;
      box-shadow: 0 0 20px var(--accent-cyan-glow);
    }

    .title {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(2rem, 4vw, 3.2rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.03em;
      max-width: 800px;
      background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
    }

    .subtitle {
      margin: 16px 0 0;
      color: var(--accent-cyan);
      font-size: 1.15rem;
      font-weight: 500;
      font-family: "Space Grotesk", sans-serif;
      letter-spacing: 0.02em;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .subtitle::before {
      content: "";
      width: 40px; height: 2px;
      background: var(--accent-cyan);
      box-shadow: 0 0 10px var(--accent-cyan-glow);
    }

    :root[data-theme="light"] .subtitle {
      color: #0284c7;
    }

    :root[data-theme="light"] .subtitle::before {
      background: #0284c7;
      box-shadow: none;
    }

    :root[data-theme="light"] .title {
      background: linear-gradient(135deg, #0f172a 0%, #334155 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .intro {
      margin: 28px 0 0;
      max-width: 950px;
      color: var(--text-secondary);
      font-size: 1.05rem;
      line-height: 1.7;
      background: rgba(6, 182, 212, 0.08);
      border: 1px solid rgba(6, 182, 212, 0.2);
      padding: 20px 24px;
      border-radius: var(--radius-lg);
      position: relative;
      backdrop-filter: var(--blur-light);
    }

    :root[data-theme="light"] .intro {
      color: #1e3a50;
      background: rgba(255, 255, 255, 0.84);
      border-color: rgba(2, 132, 199, 0.24);
      box-shadow: 0 10px 26px -18px rgba(2, 132, 199, 0.5);
    }

    .intro strong {
      color: var(--accent-cyan);
      font-weight: 600;
    }

    .status {
      margin: 16px 0 0;
      font-size: 0.9rem;
      color: var(--accent-emerald);
      min-height: 1.4rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status::before {
      content: "●";
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Impact Panel - Neon Glow */
    .impact-panel {
      margin-top: 28px;
      padding: 28px;
      border-radius: var(--radius-lg);
      border: 1px solid rgba(139, 92, 246, 0.3);
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.1) 0%, rgba(6, 182, 212, 0.05) 100%);
      box-shadow: 0 0 40px rgba(139, 92, 246, 0.1);
      position: relative;
      overflow: hidden;
    }

    :root[data-theme="light"] .impact-panel {
      border-color: rgba(139, 92, 246, 0.24);
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.08) 0%, rgba(6, 182, 212, 0.05) 100%);
      box-shadow: 0 14px 30px -20px rgba(139, 92, 246, 0.4);
    }

    .impact-panel::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-purple), transparent);
    }

    .impact-title {
      margin: 0 0 20px;
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--accent-purple);
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .impact-title::after {
      content: "";
      flex: 1; height: 1px;
      background: linear-gradient(90deg, var(--accent-purple), transparent);
      opacity: 0.5;
    }

    .chip-grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }

    .chip {
      background: var(--bg-glass);
      backdrop-filter: var(--blur-light);
      border: var(--glass-border);
      border-radius: var(--radius-md);
      padding: 20px;
      font-size: 0.95rem;
      line-height: 1.5;
      color: var(--text-secondary);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    :root[data-theme="light"] .chip {
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(15, 23, 42, 0.12);
      color: #334155;
    }

    .chip::before {
      content: "";
      position: absolute;
      top: 0; left: 0; width: 3px; height: 100%;
      background: var(--gradient-primary);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .chip:hover {
      transform: translateY(-4px);
      border-color: rgba(6, 182, 212, 0.3);
      box-shadow: 0 10px 40px rgba(6, 182, 212, 0.15);
    }

    .chip:hover::before {
      opacity: 1;
    }

    .chip strong {
      color: var(--text-primary);
      font-weight: 600;
      display: block;
      margin-bottom: 6px;
      font-family: "Space Grotesk", sans-serif;
      font-size: 1.05rem;
    }

    :root[data-theme="light"] .chip strong {
      color: #0f172a;
    }

    /* Showcase Section - Dark Glass */
    .showcase {
      margin-top: 24px;
      padding: 32px;
      border-radius: var(--radius-xl);
      background: var(--bg-card);
      backdrop-filter: var(--blur-heavy);
      border: var(--glass-border);
      box-shadow: var(--shadow-card);
      overflow: hidden;
      position: relative;
    }

    .showcase::before {
      content: "";
      position: absolute;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(6, 182, 212, 0.1), transparent 70%);
      right: -200px; bottom: -200px;
      pointer-events: none;
    }

    .showcase-title {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      font-size: 1.3rem;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .showcase-title::before {
      content: "◆";
      color: var(--accent-cyan);
      font-size: 0.8rem;
    }

    .showcase-sub {
      margin: 10px 0 20px;
      font-size: 0.95rem;
      color: var(--text-muted);
      max-width: 800px;
    }

    /* Ticker - Neon Style */
    .ticker-rail {
      overflow: hidden;
      border-radius: 999px;
      background: rgba(6, 182, 212, 0.08);
      border: 1px solid rgba(6, 182, 212, 0.2);
      margin-bottom: 24px;
      position: relative;
    }

    .ticker-rail::before,
    .ticker-rail::after {
      content: "";
      position: absolute;
      top: 0; bottom: 0;
      width: 60px;
      z-index: 2;
      pointer-events: none;
    }

    .ticker-rail::before {
      left: 0;
      background: linear-gradient(90deg, rgba(17, 24, 39, 0.9), transparent);
    }

    .ticker-rail::after {
      right: 0;
      background: linear-gradient(-90deg, rgba(17, 24, 39, 0.9), transparent);
    }

    :root[data-theme="light"] .ticker-rail::before {
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.95), transparent);
    }

    :root[data-theme="light"] .ticker-rail::after {
      background: linear-gradient(-90deg, rgba(255, 255, 255, 0.95), transparent);
    }

    .ticker-track {
      display: flex;
      gap: 16px;
      width: max-content;
      padding: 12px 16px;
      animation: tickerSlide 30s linear infinite;
    }

    .ticker-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      border-radius: 999px;
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      white-space: nowrap;
      background: rgba(6, 182, 212, 0.15);
      border: 1px solid rgba(6, 182, 212, 0.3);
      color: var(--accent-cyan);
      box-shadow: 0 0 15px rgba(6, 182, 212, 0.1);
    }

    .ticker-pill::before {
      content: "";
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent-emerald);
      box-shadow: 0 0 10px var(--accent-emerald);
      animation: blink 2s infinite;
    }

    .ticker-pill.negative::before {
      background: #ef4444;
      box-shadow: 0 0 10px #ef4444;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    @keyframes tickerSlide {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .showcase-grid {
      display: grid;
      gap: 20px;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      position: relative;
      z-index: 1;
    }

    .showcase-card {
      background: var(--bg-glass);
      backdrop-filter: var(--blur-light);
      border: var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 28px;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .showcase-card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
      background: var(--gradient-primary);
      transform: scaleX(0);
      transition: transform 0.4s;
    }

    .showcase-card:hover {
      transform: translateY(-6px);
      border-color: rgba(6, 182, 212, 0.3);
      box-shadow: var(--shadow-glow-cyan);
    }

    .showcase-card:hover::before {
      transform: scaleX(1);
    }

    .showcase-card h3 {
      margin: 0 0 12px;
      font-family: "Space Grotesk", sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.01em;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .showcase-card h3::after {
      content: "→";
      opacity: 0;
      transform: translateX(-10px);
      transition: all 0.3s;
      color: var(--accent-cyan);
    }

    .showcase-card:hover h3::after {
      opacity: 1;
      transform: translateX(0);
    }

    .showcase-card p {
      margin: 0;
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--text-secondary);
    }

    /* Table Section - Premium Dark */
    .table-wrap {
      margin-top: 24px;
      padding: 32px;
      background: var(--bg-card);
      backdrop-filter: var(--blur-heavy);
      border-radius: var(--radius-xl);
      border: var(--glass-border);
      box-shadow: var(--shadow-card);
      overflow: hidden;
    }

    .table-title {
      margin: 0 0 24px;
      font-family: "Space Grotesk", sans-serif;
      font-size: 1.1rem;
      color: var(--text-secondary);
      letter-spacing: 0.02em;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .table-title::before {
      content: "▤";
      color: var(--accent-purple);
    }

    .table-scroll {
      overflow-x: auto;
      border-radius: var(--radius-lg);
      border: 1px solid rgba(255, 255, 255, 0.05);
      background: rgba(0, 0, 0, 0.2);
    }

    :root[data-theme="light"] .table-scroll {
      border: 1px solid rgba(15, 23, 42, 0.12);
      background: rgba(248, 250, 252, 0.9);
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      min-width: 800px;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 10;
      text-align: left;
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: linear-gradient(180deg, rgba(30, 41, 59, 0.95) 0%, rgba(15, 23, 42, 0.98) 100%);
      color: var(--accent-cyan);
      padding: 20px 24px;
      border-bottom: 2px solid rgba(6, 182, 212, 0.3);
      font-weight: 600;
      white-space: nowrap;
    }

    thead th:first-child { border-radius: var(--radius-lg) 0 0 0; }
    thead th:last-child { border-radius: 0 var(--radius-lg) 0 0; }

    tbody td {
      font-size: 0.95rem;
      line-height: 1.7;
      padding: 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      vertical-align: top;
      color: var(--text-secondary);
      background: transparent;
      transition: all 0.3s;
    }

    tbody tr {
      transition: all 0.3s;
    }

    tbody tr:hover {
      background: rgba(6, 182, 212, 0.05);
    }

    tbody tr:hover td {
      color: var(--text-primary);
    }

    tbody td:first-child {
      width: 200px;
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-primary);
      border-left: 3px solid transparent;
      transition: border-color 0.3s;
    }

    tbody tr:hover td:first-child {
      border-left-color: var(--accent-cyan);
    }

    tbody td:last-child {
      width: 140px;
      text-align: center;
      white-space: nowrap;
      font-family: "Space Grotesk", sans-serif;
      font-weight: 600;
      color: var(--text-muted);
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-shadow: none;
    }

    .footer-note {
      margin-top: 24px;
      color: var(--text-muted);
      font-size: 0.9rem;
      line-height: 1.6;
      padding: 20px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: var(--radius-md);
      border-left: 3px solid var(--accent-amber);
    }

    /* Responsive */
    @media (max-width: 768px) {
      body { padding: 16px; }
      .shell { padding: 16px; }
      .toolbar { 
        top: 12px; 
        padding: 14px 18px;
        flex-direction: column;
        gap: 14px;
      }
      .toolbar-left { justify-content: center; }
      .toolbar-actions { justify-content: center; width: 100%; }
      .hero { padding: 32px 24px; }
      .title { font-size: 1.8rem; }
      .chip-grid { grid-template-columns: 1fr; }
      .showcase { padding: 24px; }
      .showcase-grid { grid-template-columns: 1fr; }
      .table-wrap { padding: 20px; }
      tbody td { padding: 16px; font-size: 0.9rem; }
      tbody td:first-child { width: auto; }
    }

    /* Scrollbar Styling */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(6, 182, 212, 0.3);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(6, 182, 212, 0.5);
    }

    /* Selection */
    ::selection {
      background: rgba(6, 182, 212, 0.3);
      color: #fff;
    }

        areas: {
          "Backend principal": "Backend principal",
          "Frontend web": "Frontend web",
          "Diseno UI/UX": "Design UI/UX",
          "Apps moviles": "Apps moveis",
          "Template / base exchange": "Template / base exchange",
          "OTP y seguridad inicial": "OTP e seguranca inicial",
          "Smart contracts": "Smart contracts",
          "Traduccion multiidioma (i18n)": "Traducao multi-idioma (i18n)",
          "Infraestructura inicial": "Infraestrutura inicial",
          "QA basico": "QA basico",
          "DevOps y despliegue": "DevOps e deploy",
          "Publicacion tiendas": "Publicacao em lojas",
          "Soporte operativo inicial": "Suporte operacional inicial"
        }
      }
    };

    const cache = { es: structuredClone(BASE), pt: cloneManualPack("pt") };
    const state = { lang: "pt", pack: cache.pt, busy: false, requestId: 0, theme: "dark" };

    const refs = {
      languageLabel: document.getElementById("languageLabel"),
      themeToggleBtn: document.getElementById("themeToggleBtn"),
      downloadBtn: document.getElementById("downloadPdfBtn"),
      title: document.getElementById("docTitle"),
      subtitle: document.getElementById("docSubtitle"),
      intro: document.getElementById("docIntro"),
      impactTitle: document.getElementById("impactTitle"),
      impactChips: document.getElementById("impactChips"),
      showcaseTitle: document.getElementById("showcaseTitle"),
      showcaseSub: document.getElementById("showcaseSub"),
      tickerTrack: document.getElementById("tickerTrack"),
      showcaseGrid: document.getElementById("showcaseGrid"),
      status: document.getElementById("statusMsg"),
      tableTitle: document.getElementById("tableTitle"),
      thArea: document.getElementById("thArea"),
      thScope: document.getElementById("thScope"),
      thBudget: document.getElementById("thBudget"),
      rows: document.getElementById("tbodyRows"),
      footer: document.getElementById("docFooter")
    };

    const THEME_STORAGE_KEY = "exchange_theme_preference";
    const BUDGET_MASK = { es: "Oculto", en: "Hidden", pt: "Oculto" };

    function getBudgetMask(lang) {
      return BUDGET_MASK[lang] || BUDGET_MASK.en;
    }

    function getPreferredTheme() {
      const stored = window.localStorage.getItem(THEME_STORAGE_KEY);
      if (stored === "dark" || stored === "light") return stored;
      const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      return prefersDark ? "dark" : "light";
    }

    function applyTheme(theme) {
      state.theme = theme === "light" ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", state.theme);
    }

    function updateThemeButtonLabel(pack) {
      const nextThemeLabel = state.theme === "dark" ? pack.ui.themeLight : pack.ui.themeDark;
      refs.themeToggleBtn.textContent = nextThemeLabel;
      refs.themeToggleBtn.setAttribute("aria-label", `${pack.ui.toggleTheme}: ${nextThemeLabel}`);
      refs.themeToggleBtn.setAttribute("title", `${pack.ui.toggleTheme}: ${nextThemeLabel}`);
    }

    function render() {
      const pack = state.pack;
      document.documentElement.lang = state.lang;

      refs.languageLabel.textContent = pack.ui.language;
      refs.downloadBtn.textContent = pack.ui.download;
      updateThemeButtonLabel(pack);
      refs.title.textContent = pack.doc.title;
      refs.subtitle.textContent = pack.doc.subtitle;
      refs.intro.textContent = pack.doc.intro;
      refs.footer.textContent = pack.doc.footer;
      refs.footer.style.display = pack.doc.footer ? "block" : "none";
      refs.impactTitle.textContent = pack.highlights.title;
      refs.impactChips.innerHTML = "";
      pack.highlights.items.forEach((item) => {
        const chip = document.createElement("div");
        chip.className = "chip";
        const strong = document.createElement("strong");
        strong.textContent = item.head;
        chip.append(strong, document.createTextNode(" " + item.body));
        refs.impactChips.appendChild(chip);
      });

      refs.showcaseTitle.textContent = pack.showcase.title;
      refs.showcaseSub.textContent = pack.showcase.subtitle;

      refs.tickerTrack.innerHTML = "";
      const tickerLoop = [...pack.showcase.tickers, ...pack.showcase.tickers];
      tickerLoop.forEach((label, i) => {
        const pill = document.createElement("span");
        pill.className = "ticker-pill";
        if (label.includes("-")) pill.classList.add("negative");
        pill.textContent = label;
        refs.tickerTrack.appendChild(pill);
      });

      refs.showcaseGrid.innerHTML = "";
      pack.showcase.cards.forEach((card) => {
        const el = document.createElement("article");
        el.className = "showcase-card";
        const h3 = document.createElement("h3");
        h3.textContent = card.title;
        const p = document.createElement("p");
        p.textContent = card.body;
        el.append(h3, p);
        refs.showcaseGrid.appendChild(el);
      });

      refs.tableTitle.textContent = pack.ui.tableTitle;
      refs.thArea.textContent = pack.table.area;
      refs.thScope.textContent = pack.table.scope;
      refs.thBudget.textContent = pack.table.budget;

      refs.rows.innerHTML = "";
      const maskedBudget = getBudgetMask(state.lang);
      pack.items.forEach((item) => {
        const tr = document.createElement("tr");
        const tdArea = document.createElement("td"); tdArea.textContent = item.area;
        const tdScope = document.createElement("td"); tdScope.textContent = item.scope;
        const tdBudget = document.createElement("td"); tdBudget.textContent = maskedBudget;
        tr.append(tdArea, tdScope, tdBudget);
        refs.rows.appendChild(tr);
      });

      document.querySelectorAll(".lang-btn").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.lang === state.lang);
        btn.disabled = state.busy;
      });

      refs.downloadBtn.disabled = state.busy;
      refs.themeToggleBtn.disabled = state.busy;
    }

    function cloneManualPack(lang) {
      const m = MANUAL[lang];
      return {
        ui: structuredClone(m.ui),
        doc: {
          title: m.doc.title,
          subtitle: m.doc.subtitle,
          intro: m.doc.intro || BASE.doc.intro,
          footer: Object.prototype.hasOwnProperty.call(m.doc, "footer") ? m.doc.footer : BASE.doc.footer
        },
        highlights: m.highlights ? structuredClone(m.highlights) : structuredClone(BASE.highlights),
        showcase: m.showcase ? structuredClone(m.showcase) : structuredClone(BASE.showcase),
        table: structuredClone(m.table),
        items: BASE.items.map((it, i) => ({
          area: m.areas[it.area] || it.area,
          scope: m.scopes && m.scopes.length ? m.scopes[i] || it.scope : it.scope,
          budget: it.budget
        }))
      };
    }

    async function translateText(text, target) {
      const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=es&tl=${target}&dt=t&q=${encodeURIComponent(text)}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error("translate_request_failed");
      const data = await res.json();
      return Array.isArray(data[0]) ? data[0].map((part) => part[0]).join("") : text;
    }

    async function ensureLangPack(lang) {
      if (cache[lang]) return cache[lang];

      const draft = cloneManualPack(lang);
      cache[lang] = draft;

      try {
        const translatedScopes = await Promise.all(BASE.items.map((it) => translateText(it.scope, lang)));
        const intro = await translateText(BASE.doc.intro, lang);
        const footer = await translateText(BASE.doc.footer, lang);

        draft.items = BASE.items.map((it, i) => ({
          area: draft.items[i].area,
          scope: translatedScopes[i] || it.scope,
          budget: it.budget
        }));
        draft.doc.intro = intro || BASE.doc.intro;
        draft.doc.footer = footer || BASE.doc.footer;
      } catch (err) {
        console.warn("translation_fallback", err);
      }

      cache[lang] = draft;
      return draft;
    }

    function setStatus(text) {
      refs.status.textContent = text || "";
    }

    function toggleTheme() {
      const nextTheme = state.theme === "dark" ? "light" : "dark";
      applyTheme(nextTheme);
      window.localStorage.setItem(THEME_STORAGE_KEY, nextTheme);
      updateThemeButtonLabel(state.pack);
    }

    async function switchLanguage(lang) {
      if (lang === state.lang || state.busy) return;

      state.lang = lang;
      if (cache[lang]) {
        state.pack = cache[lang];
        setStatus("");
        render();
        return;
      }

      const requestId = ++state.requestId;
      state.busy = true;
      state.pack = cloneManualPack(lang);
      setStatus(state.pack.ui.status.loading);
      render();

      try {
        const pack = await ensureLangPack(lang);
        if (requestId !== state.requestId) return;
        state.pack = pack;
        setStatus("");
      } catch (err) {
        if (requestId !== state.requestId) return;
        setStatus(state.pack.ui.status.error);
      } finally {
        if (requestId === state.requestId) {
          state.busy = false;
          render();
        }
      }
    }

    function downloadPdf() {
      const pack = state.pack;
      const jsPdfLib = window.jspdf && window.jspdf.jsPDF;

      if (!jsPdfLib) {
        window.print();
        return;
      }

      const doc = new jsPdfLib({ orientation: "landscape", unit: "pt", format: "a4" });
      const maskedBudget = getBudgetMask(state.lang);
      const rows = pack.items.map((item) => [item.area, item.scope, maskedBudget]);

      doc.setFont("helvetica", "bold");
      doc.setFontSize(16);
      doc.text(pack.doc.title, 40, 38);
      doc.setFont("helvetica", "normal");
      doc.setFontSize(11);
      doc.text(pack.doc.subtitle, 40, 56);
      doc.setFontSize(9);
      doc.text(pack.doc.intro, 40, 74, { maxWidth: 760 });

      if (typeof doc.autoTable === "function") {
        doc.autoTable({
          startY: 92,
          margin: { left: 40, right: 40 },
          head: [[pack.table.area, pack.table.scope, pack.table.budget]],
          body: rows,
          theme: "grid",
          styles: { fontSize: 8, cellPadding: 5, overflow: "linebreak", textColor: [26, 54, 66], valign: "top" },
          headStyles: { fillColor: [11, 122, 152], textColor: [255, 255, 255], fontStyle: "bold" },
          columnStyles: { 0: { cellWidth: 130 }, 1: { cellWidth: 510 }, 2: { cellWidth: 88, halign: "center" } }
        });
        const finalY = doc.lastAutoTable && doc.lastAutoTable.finalY ? doc.lastAutoTable.finalY : 92;
        doc.setFontSize(8);
        doc.text(pack.doc.footer, 40, Math.min(finalY + 18, 560), { maxWidth: 760 });
      }

      const nameMap = { es: "espanol", en: "english", pt: "portugues" };
      doc.save(`presupuesto_mvp_${nameMap[state.lang]}.pdf`);
    }

    document.querySelectorAll(".lang-btn").forEach((btn) => {
      btn.addEventListener("click", () => switchLanguage(btn.dataset.lang));
    });
    refs.themeToggleBtn.addEventListener("click", toggleTheme);
    refs.downloadBtn.addEventListener("click", downloadPdf);

    applyTheme(getPreferredTheme());
    render();
  </script>
</body>
</html>
